name: Verify

# PR / branch verification: build, test, and lint the Go code. The image build
# here is only a smoke test — pushing to a registry happens in the deploy
# workflow (ci-master.yml) on push to master.
on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. new pushes to a PR branch).
concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Single source of truth for the Go version.
          go-version-file: go.mod
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -vet=off ./...

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        # v8 supports golangci-lint v2 (see version in .golangci.yml).
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: schedule-message-bot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
