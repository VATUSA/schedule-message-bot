name: CI to Production
# schedule-message-bot has no dev environment: every push to master builds the
# image and releases it straight to prod, no manual gate.
on:
  push:
    branches: [master]
jobs:
  common-build:
    uses: vatusa/gitops/.github/workflows/common-build.yml@main
    with:
      image-name: 'schedule-message-bot'
    secrets: inherit
  common-release:
    uses: vatusa/gitops/.github/workflows/common-release.yml@main
    needs: common-build
    with:
      image-name: 'schedule-message-bot'
      kustomization-folder: 'schedule-message-bot'
    secrets: inherit
