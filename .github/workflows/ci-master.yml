name: Build & Deploy

# On every push to master, build and push the bot image to Docker Hub, then
# bump the image tag in the gitops repo so ArgoCD rolls out the new version.
# PR / branch verification (build, test, lint) lives in ci.yml.
on:
  push:
    branches: [master]

permissions:
  contents: read

# Never run two deploys for the same ref at once; let an in-flight one finish.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: vatusa/schedule-message-bot

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ArgoCD
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out the gitops repo
        uses: actions/checkout@v5
        with:
          repository: VATUSA/gitops
          path: gitops
          token: ${{ secrets.G_TOKEN }}

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag
        run: |
          cd gitops/schedule-message-bot
          kustomize edit set image ${{ env.IMAGE }}=${{ env.IMAGE }}:${{ github.sha }}

      - name: Commit and push changes
        run: |
          cd gitops
          git config user.email "vatusa6@vatusa.net"
          git config user.name "VATUSA6"
          git add .
          git commit -m "Update schedule-message-bot image tag to ${{ github.sha }}"
          git push origin main
