name: Build and Push Image
# On every push to master, build and push the image to Docker Hub (tagged
# `latest` and the commit SHA). Production rollout is a separate, manual step:
# prod-release.yml pins the prod overlay in the gitops repo to a chosen SHA.
on:
  push:
    branches: [master]
jobs:
  common-build:
    uses: vatusa/gitops/.github/workflows/common-build.yml@main
    with:
      image-name: 'schedule-message-bot'
    secrets: inherit
